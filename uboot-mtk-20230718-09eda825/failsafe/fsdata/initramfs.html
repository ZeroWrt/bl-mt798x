<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <title>加载 Initramfs</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/main.js"></script>
</head>
<body data-page="initramfs" onload="startup()">
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <div class="logo">📱</div>
        <div class="brand">
          <span class="brand-name">联发科工具</span>
          <span class="brand-tagline">MediaTek Firmware Tool</span>
        </div>
      </div>
      
      <nav class="header-center">
        <div class="nav-links">
          <a href="/" class="nav-link">
            <span class="nav-icon">📦</span>
            <span class="nav-text">固件更新</span>
          </a>
          <a href="/uboot.html" class="nav-link">
            <span class="nav-icon">🚀</span>
            <span class="nav-text">U-Boot 更新</span>
          </a>
          <a href="/gpt.html" class="nav-link">
            <span class="nav-icon">💾</span>
            <span class="nav-text">GPT 更新</span>
          </a>
          <a href="/initramfs.html" class="nav-link active">
            <span class="nav-icon">📁</span>
            <span class="nav-text">加载 Initramfs</span>
          </a>
          <a href="/bl2.html" class="nav-link">
            <span class="nav-icon">⚡</span>
            <span class="nav-text">BL2 更新</span>
          </a>
        </div>
      </nav>
      
      <div class="header-right"></div>
    </header>
    
    <main class="main-content">
      <div class="form-card">
        <h2 class="form-title" id="form-title">加载 Initramfs</h2>
        <p class="form-desc" id="form-desc">您将要在设备上加载 initramfs</p>
        
        <form id="form">
          <div id="upload-area">
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file').click()">
              <div class="upload-icon">📂</div>
              <div class="upload-title">点击选择文件</div>
              <div class="upload-hint">支持 .cpio, .gz, .img 等格式</div>
            </div>
            <input type="file" id="file" name="initramfs" class="file-input" onchange="handleFileSelect(event)">
          </div>
          
          <div id="file-selected" class="file-selected hidden">
            <div class="file-selected-icon">📄</div>
            <div class="file-selected-info">
              <div class="file-selected-name" id="file-name"></div>
              <div class="file-selected-size" id="file-size"></div>
            </div>
            <button type="button" class="file-selected-remove" onclick="removeFile()">✕</button>
          </div>
          
          <div class="btn-group">
            <button type="button" class="btn btn-primary" id="upload-btn" onclick="upload('initramfs')" disabled>
              <span>⬆️</span> 上传
            </button>
          </div>
        </form>
        
        <div class="progress-bar hidden" id="bar">
          <div class="progress-fill" style="width: 0%;">0%</div>
        </div>
        
        <div id="size" class="info-grid hidden"></div>
        
        <div id="md5" class="hidden"></div>
        
        <div id="upgrade" class="text-center hidden" style="margin-top: 24px;">
          <p class="text-success">如果以上信息均正确，请点击"启动"</p>
          <a href="/booting.html" class="btn btn-success">
            <span>🚀</span> 启动
          </a>
        </div>
        
        <div class="warning-card">
          <div class="warning-title">
            <span>⚠️</span>
            <span>警告</span>
          </div>
          <ul class="warning-list" id="warning-list">
            <li>如果一切正常，设备将进入 initramfs</li>
            <li>您可以上传任意文件，但请确保为您的设备选择了正确的 initramfs 镜像</li>
          </ul>
        </div>
      </div>
    </main>
    
    <div id="version"></div>
    <div class="footer">Copyright © 2026 bl-mt798x by MomoFlora</div>
  </div>
</body>
</html>
